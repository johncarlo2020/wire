<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Buzz Wire Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="timer-wrap">
        <img src="assets/Time_2x.webp" alt="Timer bar" class="timer-bg">
        <div class="timer-content">
          <div class="timer-row">
            <span class="timer-label">TIME | MASA</span>
            <span id="timer">00:20</span>
          </div>
          <div class="timer-progress" aria-hidden="true">
            <span id="timerFill" class="timer-fill"></span>
          </div>
        </div>
      </div>
    </header>

    <section class="board-panel">
      <div id="board" class="board" aria-label="Buzz wire board">
        <img id="map" src="assets/map.webp" alt="Game map" class="map">
        <canvas id="trail" class="trail" aria-hidden="true"></canvas>
        <canvas id="microLayer" class="micro-layer" aria-hidden="true"></canvas>
        <img id="startTag" src="assets/Start Here_2x.webp" alt="Start here" class="start-tag">
        <img id="kibble" src="assets/Kibble_2x.webp" alt="Kibble" class="kibble" draggable="false">

        <div id="stageCard1" class="stage-card green">
          <img id="stageCardImg1" class="stage-card-image" src="assets/S1_2x/S1-Stage 1-Empty_2x.webp" alt="Stage 1 status card">
        </div>
        <div id="stageCard2" class="stage-card blue">
          <img id="stageCardImg2" class="stage-card-image" src="assets/S2_2x/S2-Stage 2-Empty_2x.webp" alt="Stage 2 status card">
        </div>
        <div id="stageCard3" class="stage-card yellow">
          <img id="stageCardImg3" class="stage-card-image" src="assets/S3_2x/S3-Stage 3-Empty_2x.webp" alt="Stage 3 status card">
        </div>
        <div id="stageCard4" class="stage-card violet">
          <img id="stageCardImg4" class="stage-card-image" src="assets/S4_2x/S4-Stage 4-Empty_2x.webp" alt="Stage 4 status card">
        </div>
        <div id="stageCard5" class="stage-card red">
          <img id="stageCardImg5" class="stage-card-image" src="assets/S5_2x/S5-Stage 5-Empty_2x.webp" alt="Stage 5 status card">
        </div>

        <div id="phaseToast" class="hidden phase-toast" role="status" aria-live="polite"></div>

        <div id="landingScreen" class="phase-screen">
          <img src="assets/landing.webp" alt="Landing screen">
          <button id="landingBtn" type="button" class="phase-action-button">START | MULA</button>
        </div>
        <div id="guideScreen" class="hidden phase-screen">
          <img src="assets/guide.webp" alt="Guide screen">
          <button id="guideBtn" type="button" class="phase-action-button">READY | SEDIA</button>
        </div>
        <div id="endScreen" class="hidden phase-screen">
          <img src="assets/end.webp" alt="End screen">
          <button id="endBtn" type="button" class="phase-action-button">HOME | LAMAN UTAMA</button>
        </div>
        <div id="againScreen" class="hidden phase-screen">
          <img src="assets/again.webp" alt="Try again screen">
          <button id="againBtn" type="button" class="phase-action-button">HOME | LATAN</button>
        </div>
        <div id="countdownOverlay" class="hidden countdown-overlay" aria-live="polite">
          <span class="countdown-label">Ready | Sedia</span>
          <span id="countdownText">3</span>
        </div>

        <div id="overlay" class="hidden overlay">
          <div class="dialog">
            <h2 id="dialogTitle">Game Over</h2>
            <p id="dialogText">You touched the border.</p>
            <button id="restartBtn" type="button">Play Again</button>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
